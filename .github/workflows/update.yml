name: Update packages

on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-packages
  cancel-in-progress: false

jobs:
  update:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: python3 scripts/update.py
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Validate generated files
        run: |
          python3 -m json.tool packages.json >/dev/null
          for f in bucket/*.json; do python3 -m json.tool "$f" >/dev/null; done
          for f in Formula/*.rb; do ruby -c "$f"; done
      - name: Commit updates
        run: |
          if git diff --quiet; then
            echo 'Package metadata is already current.'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Formula bucket
          git commit -m 'packages: update generated metadata'
          git push
