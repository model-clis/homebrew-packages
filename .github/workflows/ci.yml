name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: python3 scripts/update.py
      - run: git diff --exit-code
      - name: Validate JSON
        run: |
          python3 -m json.tool packages.json >/dev/null
          for f in bucket/*.json; do python3 -m json.tool "$f" >/dev/null; done
      - name: Check Ruby syntax
        run: |
          for f in Formula/*.rb; do ruby -c "$f"; done

  homebrew:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - run: for f in Formula/*.rb; do brew style "$f"; done
      - run: brew tap model-clis/packages "$GITHUB_WORKSPACE"
      - name: Audit formulae
        run: |
          for f in Formula/*.rb; do
            brew audit --strict "model-clis/packages/$(basename "$f" .rb)"
          done
